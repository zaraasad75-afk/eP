<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Login Modal</title>
<style>
*,
*::before,
*::after {
  box-sizing: border-box;
  margin: 0;
  padding: 0;
}

/* Overlay */
.modal-overlay {
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,0.5);
  display: flex;
  justify-content: center;
  align-items: center;
  padding: 16px;
  overflow-y: auto;
  z-index: 1000;
}

/* Modal */
.modal {
  background: #fff;
  border-radius: 8px;
  width: 100%;
  max-width: 380px;
  padding: 24px;
  box-shadow: 0 5px 15px rgba(0,0,0,0.3);
  font-family: Arial, sans-serif;
  position: relative;
}

/* Close button */
.modal-close {
  position: absolute;
  top: 10px;
  right: 12px;
  background: transparent;
  border: none;
  font-size: 22px;
  cursor: pointer;
}

/* Tabs */
.tabs {
  display: flex;
  border-bottom: 1px solid #ddd;
  margin-bottom: 20px;
}

.tab {
  flex: 1;
  text-align: center;
  padding: 12px;
  cursor: pointer;
  font-weight: bold;
  color: #666;
  border-bottom: 2px solid transparent;
}

.tab.active {
  color: #000;
  border-bottom-color: #f97316;
}

/* Form */
form {
  display: flex;
  flex-direction: column;
  gap: 14px;
}

input {
  padding: 12px;
  font-size: 14px;
  border: 1px solid #ccc;
  border-radius: 6px;
  outline: none;
  width: 100%;
}

input:focus {
  border-color: #f97316;
}

/* Password toggle */
.password-wrapper {
  position: relative;
}

.toggle-password {
  position: absolute;
  right: 10px;
  top: 50%;
  transform: translateY(-50%);
  cursor: pointer;
}

/* Login button */
.login-btn {
  background: #f97316;
  color: white;
  border: none;
  padding: 14px;
  font-weight: bold;
  border-radius: 6px;
  cursor: pointer;
  width: 100%;
}

.login-btn:hover {
  background: #d3630d;
}

/* Forgot password */
.forgot-password {
  text-align: right;
  font-size: 12px;
  color: #666;
}

/* Signup */
.signup-text {
  text-align: center;
  margin: 14px 0;
  font-size: 14px;
  color: #555;
}

.signup-text a {
  color: #2563eb;
  text-decoration: none;
}

/* Social section */
.or-login {
  text-align: center;
  font-size: 13px;
  color: #666;
  margin-bottom: 12px;
}

.social-buttons {
  display: flex;
  justify-content: center;
  gap: 18px;
  flex-wrap: wrap;
}

.social-button {
  display: flex;
  align-items: center;
  gap: 6px;
  font-size: 14px;
  cursor: pointer;
}

/* ------------------ MOBILE ------------------ */
@media (max-width: 480px) {

  .modal {
    padding: 18px;
    max-width: 100%;
  }

  .tabs {
    font-size: 14px;
  }

  input {
    font-size: 13px;
    padding: 10px;
  }

  .login-btn {
    padding: 12px;
    font-size: 14px;
  }

  .social-buttons {
    flex-direction: column;
    align-items: center;
  }

}

/* ------------------ TABLET ------------------ */
@media (min-width: 481px) and (max-width: 768px) {

  .modal {
    max-width: 420px;
  }

}

/* ------------------ LARGE SCREENS ------------------ */
@media (min-width: 1200px) {

  .modal {
    max-width: 420px;
  }

}


</style>
</head>
<body>

<!-- Modal overlay -->
<div class="modal-overlay" id="loginModal">
  <div class="modal" role="dialog" aria-modal="true" aria-labelledby="loginTitle">
    <button class="modal-close" aria-label="Close modal" id="closeModal">&times;</button>

    <!-- Tabs -->
    <div class="tabs" role="tablist">
      <div class="tab active" role="tab" id="tab-password" aria-controls="panel-password" tabindex="0">Password</div>
      <div class="tab" role="tab" id="tab-phone" aria-controls="panel-phone" tabindex="-1">Phone Number</div>
    </div>

    <!-- Panels -->
    <div id="panel-password" role="tabpanel" aria-labelledby="tab-password">
      <form id="passwordLoginForm" autocomplete="off">
        <input type="email" name="email" placeholder="Email address" required aria-label="Email address" />
        <div class="password-wrapper">
          <input type="password" name="password" placeholder="Password" required aria-label="Password" id="passwordInput" />
          <span class="toggle-password" id="togglePassword" title="Show/Hide password">&#128065;</span>
        </div>
        <div class="forgot-password" tabindex="0">Forgot password?</div>
        <button type="submit" class="login-btn">LOGIN</button>
      </form>
    </div>

    <div id="panel-phone" role="tabpanel" aria-labelledby="tab-phone" hidden>
      <form id="phoneLoginForm" autocomplete="off">
        <input type="tel" name="phone" placeholder="Phone number" required aria-label="Phone number" />
        <button type="submit" class="login-btn">LOGIN</button>
      </form>
    </div>

    <div class="signup-text">
      Don't have an account? <a href="#">Sign up</a>
    </div>

    <div class="or-login">Or, login with</div>
    <div class="social-buttons">
      <div class="social-button google" tabindex="0" role="button" aria-label="Login with Google">
        <!-- Google SVG Icon -->
        <svg viewBox="0 0 533.5 544.3"><path fill="#4285f4" d="M533.5 278.4c0-17.4-1.4-34.1-4.2-50.4H272v95.6h146.9c-6.3 34.2-25.4 63.3-54.2 82.9v68h87.4c51.1-47.2 80.6-116.4 80.6-196.1z"/><path fill="#34a853" d="M272 544.3c73.4 0 135.1-24.3 180.1-65.8l-87.4-68c-24.2 16.2-55.2 25.9-92.7 25.9-71.3 0-131.7-48.2-153.3-112.9H29.8v70.7c44.4 87.5 135.3 150.1 242.2 150.1z"/><path fill="#fbbc04" d="M118.7 324.7c-10.2-30.5-10.2-63.2 0-93.7v-70.7H29.8c-36 69.4-36 152.2 0 221.6l88.9-57.2z"/><path fill="#ea4335" d="M272 107.7c39.7 0 75.3 13.7 103.5 40.7l77.6-77.6C399.3 24 338.5 0 272 0 165.1 0 74.2 62.7 29.8 150.2l88.9 70.7c21.4-64.6 81.8-112.9 153.3-112.9z"/></svg>
        Google
      </div>
      <div class="social-button facebook" tabindex="0" role="button" aria-label="Login with Facebook">
        <!-- Facebook SVG Icon -->
        <svg viewBox="0 0 320 512"><path fill="#1877f2" d="M279.14 288l14.22-92.66h-88.91V127.2c0-25.35 12.42-50.06 52.24-50.06h40.42V6.26S293.64 0 269.35 0c-73.18 0-121.04 44.38-121.04 124.72v70.62H83.41V288h83.9v224h100.2V288z"/></svg>
        Facebook
      </div>
    </div>

  </div>
</div>

<script>
  // Tab switching logic
  const tabs = document.querySelectorAll('.tab');
  const panels = {
    password: document.getElementById('panel-password'),
    phone: document.getElementById('panel-phone')
  };

  tabs.forEach(tab => {
    tab.addEventListener('click', () => {
      tabs.forEach(t => {
        t.classList.remove('active');
        t.setAttribute('tabindex', '-1');
      });
      tab.classList.add('active');
      tab.setAttribute('tabindex', '0');

      // Show/hide panels
      if(tab.id === 'tab-password') {
        panels.password.hidden = false;
        panels.phone.hidden = true;
      } else {
        panels.password.hidden = true;
        panels.phone.hidden = false;
      }
    });
  });

  // Toggle password visibility
  const togglePassword = document.getElementById('togglePassword');
  const passwordInput = document.getElementById('passwordInput');
  togglePassword.addEventListener('click', () => {
    if(passwordInput.type === 'password') {
      passwordInput.type = 'text';
      togglePassword.textContent = '🙈';
    } else {
      passwordInput.type = 'password';
      togglePassword.textContent = '👁️';
    }
  });

  // Close modal on close button click
  document.getElementById('closeModal').addEventListener('click', () => {
    document.getElementById('loginModal').style.display = 'none';
  });

  // You can add form submission handlers here if needed
</script>

</body>
</html>
