<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CERA — Order Tracking</title>

<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;500;600&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
}

:root{
--black:#0f0f0f;
--dark:#181818;
--white:#f6f6f6;
--gold:#c9a96e;
--border:rgba(255,255,255,0.08);
}

body{
font-family:'DM Sans',sans-serif;
background:var(--black);
color:var(--white);
line-height:1.6;
}

/* HEADER */

.header{
text-align:center;
padding:80px 20px 60px;
border-bottom:1px solid var(--border);
}

.header h1{
font-family:'Cormorant Garamond',serif;
font-size:56px;
letter-spacing:6px;
font-weight:400;
}

.header span{
color:var(--gold);
}

.header p{
color:#aaa;
margin-top:10px;
}

/* MAIN SECTION */

.tracking{
max-width:900px;
margin:auto;
padding:60px 30px;
}

.tracking h2{
font-family:'Cormorant Garamond',serif;
font-size:36px;
color:var(--gold);
text-align:center;
margin-bottom:30px;
}

.tracking p{
color:#ccc;
text-align:center;
margin-bottom:30px;
}

/* FORM */

.track-box{
background:var(--dark);
padding:35px;
border-radius:12px;
border:1px solid var(--border);
}

form{
display:flex;
flex-direction:column;
gap:15px;
}

input{
padding:12px;
border-radius:8px;
border:1px solid var(--border);
background:var(--black);
color:white;
}

input:focus{
outline:none;
border-color:var(--gold);
}

button{
padding:12px;
border:none;
border-radius:8px;
background:var(--gold);
color:black;
font-weight:500;
cursor:pointer;
transition:0.3s;
}

button:hover{
background:#b59150;
}

/* RESULT BOX */

.result{
margin-top:25px;
padding:20px;
border-radius:10px;
background:#121212;
border:1px solid var(--border);
display:none;
}

.footer{
text-align:center;
padding:30px;
border-top:1px solid var(--border);
color:#777;
font-size:13px;
margin-top:60px;
}

</style>
</head>

<body>

<header class="header">
<h1>CERA<span>.</span></h1>
<p>Track Your Tile Order</p>
</header>

<section class="tracking">

<h2>Order Tracking</h2>

<p>Enter your order ID and email to check the current status of your order.</p>

<div class="track-box">

<form onsubmit="return trackOrder()">

<input type="text" id="orderID" placeholder="Enter Order ID">

<input type="email" id="email" placeholder="Enter Email Address">

<button type="submit">Track Order</button>

</form>

<div class="result" id="resultBox">
<p id="statusText"></p>
</div>

</div>
<div id="map" style="display:none; margin-top:20px;">
<iframe
width="100%"
height="350"
style="border:0;border-radius:10px"
loading="lazy"
allowfullscreen
src="https://www.google.com/maps?q=Karachi&output=embed">
</iframe>
</div>


</section>

<footer class="footer">
© 2026 CERA Tiles — All Rights Reserved
</footer>

<script>
function trackOrder(){

let order=document.getElementById("orderID").value.trim();
let email=document.getElementById("email").value.trim();

let result=document.getElementById("resultBox");
let status=document.getElementById("statusText");
let map=document.getElementById("map");

if(order=="" || email==""){
alert("Please enter Order ID and Email");
return false;
}

if(order === "27122012"){

result.style.display="block";
status.innerHTML="🚚 Your tile order is <b>On the Way</b>.";

map.style.display="block";

}

else if(order === "652013"){

result.style.display="block";
status.innerHTML="📦 Your tile order has been <b>Shipped</b>.";

map.style.display="block";

}

else{

result.style.display="block";
status.innerHTML="❌ Order not found.";

map.style.display="none";

}

return false;
}



</script>

</body>
</html>
