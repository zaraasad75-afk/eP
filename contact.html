<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CERA — Contact</title>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,400&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --black: #0e0e0e;
      --dark: #1a1917;
      --white: #fafaf8;
      --cream: #f4f1ec;
      --gold: #c9a96e;
      --stone: #8c8578;
      --mid: #5b5b5b;
      --border: #2e2d2b;
    }

    body {
      font-family: 'DM Sans', sans-serif;
      background: var(--dark);
      color: #fff;
    }

    /* ── CONTACT SECTION ── */
    .contact-section {
      background: var(--dark);
      padding: 96px 0 80px;
      position: relative;
      overflow: hidden;
    }

    /* subtle background texture */
    .contact-section::before {
      content: '';
      position: absolute;
      top: -120px; right: -120px;
      width: 500px; height: 500px;
      background: radial-gradient(circle, rgba(201,169,110,0.07) 0%, transparent 70%);
      pointer-events: none;
    }
    .contact-section::after {
      content: '';
      position: absolute;
      bottom: -80px; left: -80px;
      width: 360px; height: 360px;
      background: radial-gradient(circle, rgba(201,169,110,0.05) 0%, transparent 70%);
      pointer-events: none;
    }

    .contact-container {
      max-width: 1160px;
      margin: 0 auto;
      padding: 0 40px;
      position: relative;
      z-index: 2;
    }

    /* section heading */
    .contact-heading {
      margin-bottom: 56px;
    }
    .contact-heading .eyebrow {
      font-size: 11px;
      letter-spacing: 3px;
      text-transform: uppercase;
      color: var(--gold);
      font-weight: 500;
      margin-bottom: 12px;
      display: block;
    }
    .contact-heading h2 {
      font-family: 'Cormorant Garamond', serif;
      font-size: clamp(36px, 5vw, 58px);
      font-weight: 300;
      color: #fff;
      line-height: 1.1;
    }
    .contact-heading h2 em {
      font-style: italic;
      color: var(--gold);
    }

    /* grid layout */
    .contact-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 48px;
      align-items: start;
    }

    /* ── LEFT: FORM ── */
    .contact-form-wrap {
      background: rgba(255,255,255,0.03);
      border: 1px solid rgba(255,255,255,0.07);
      border-radius: 16px;
      padding: 44px 40px;
      backdrop-filter: blur(8px);
    }

    .form-row {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 16px;
    }

    .form-group {
      margin-bottom: 18px;
    }
    .form-group label {
      display: block;
      font-size: 11px;
      font-weight: 600;
      letter-spacing: 1.5px;
      text-transform: uppercase;
      color: var(--stone);
      margin-bottom: 8px;
    }
    .form-group input,
    .form-group textarea,
    .form-group select {
      width: 100%;
      background: rgba(255,255,255,0.05);
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: 8px;
      padding: 13px 16px;
      font-family: 'DM Sans', sans-serif;
      font-size: 14px;
      color: #fff;
      outline: none;
      transition: border-color 0.25s, background 0.25s;
    }
    .form-group input::placeholder,
    .form-group textarea::placeholder { color: #555; }
    .form-group input:focus,
    .form-group textarea:focus,
    .form-group select:focus {
      border-color: var(--gold);
      background: rgba(201,169,110,0.05);
    }
    .form-group select option { background: #1a1917; color: #fff; }
    .form-group textarea {
      height: 110px;
      resize: none;
    }

    .submit-btn {
      width: 100%;
      background: var(--gold);
      color: #fff;
      border: none;
      border-radius: 8px;
      padding: 15px 28px;
      font-family: 'DM Sans', sans-serif;
      font-size: 13px;
      font-weight: 600;
      letter-spacing: 1.5px;
      text-transform: uppercase;
      cursor: pointer;
      transition: all 0.25s ease;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      margin-top: 6px;
    }
    .submit-btn:hover {
      background: #b8925a;
      transform: translateY(-2px);
      box-shadow: 0 10px 28px rgba(201,169,110,0.3);
    }
    .submit-btn svg { transition: transform 0.2s; }
    .submit-btn:hover svg { transform: translateX(4px); }

    /* ── RIGHT: INFO + MAP ── */
    .contact-right {
      display: flex;
      flex-direction: column;
      gap: 24px;
    }

    /* info cards */
    .info-cards {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 16px;
    }
    .info-card {
      background: rgba(255,255,255,0.03);
      border: 1px solid rgba(255,255,255,0.07);
      border-radius: 12px;
      padding: 22px 20px;
      transition: border-color 0.25s, background 0.25s;
      text-decoration: none;
      color: inherit;
      display: block;
    }
    .info-card:hover {
      border-color: rgba(201,169,110,0.35);
      background: rgba(201,169,110,0.04);
    }
    .info-card .ic-icon {
      font-size: 22px;
      margin-bottom: 12px;
      display: block;
    }
    .info-card .ic-label {
      font-size: 10px;
      font-weight: 600;
      letter-spacing: 2px;
      text-transform: uppercase;
      color: var(--gold);
      margin-bottom: 6px;
    }
    .info-card .ic-value {
      font-size: 13.5px;
      color: #d0c8be;
      line-height: 1.6;
    }
    .info-card .ic-value a {
      color: #d0c8be;
      text-decoration: none;
      transition: color 0.2s;
    }
    .info-card .ic-value a:hover { color: var(--gold); }

    /* hours card spans full width */
    .info-card.full {
      grid-column: 1 / -1;
      display: flex;
      align-items: center;
      gap: 20px;
    }
    .info-card.full .ic-icon { margin-bottom: 0; font-size: 28px; }
    .info-card.full .ic-text {}

    /* map */
    .map-wrap {
      border-radius: 12px;
      overflow: hidden;
      border: 1px solid rgba(255,255,255,0.08);
      position: relative;
    }
    .map-wrap iframe {
      width: 100%;
      height: 260px;
      display: block;
      filter: grayscale(30%) contrast(1.05);
    }
    .map-overlay-label {
      position: absolute;
      top: 16px; left: 16px;
      background: rgba(14,14,14,0.88);
      border: 1px solid rgba(201,169,110,0.4);
      border-radius: 8px;
      padding: 8px 14px;
      display: flex;
      align-items: center;
      gap: 8px;
      font-size: 12px;
      font-weight: 600;
      color: #fff;
      backdrop-filter: blur(6px);
    }
    .map-overlay-label span { color: var(--gold); font-size: 14px; }

    /* ── DIVIDER LINE ── */
    .contact-divider {
      border: none;
      border-top: 1px solid rgba(255,255,255,0.07);
      margin: 64px 0 0;
    }

    /* responsive */
    @media (max-width: 900px) {
      .contact-grid { grid-template-columns: 1fr; }
      .contact-container { padding: 0 24px; }
      .contact-section { padding: 64px 0 56px; }
    }
    @media (max-width: 580px) {
      .form-row { grid-template-columns: 1fr; }
      .info-cards { grid-template-columns: 1fr; }
      .info-card.full { flex-direction: column; align-items: flex-start; }
      .contact-form-wrap { padding: 28px 22px; }
    }
  </style>
</head>
<body>

<!-- ══════════════════════════════════════════
     CONTACT SECTION  — drop this into your site
═══════════════════════════════════════════ -->
<section id="contact" class="contact-section">
  <div class="contact-container">

    <!-- Heading -->
    <div class="contact-heading">
      <span class="eyebrow">We'd Love to Hear From You</span>
      <h2>Get <em>In Touch</em></h2>
    </div>

    <!-- Grid: Form + Info/Map -->
    <div class="contact-grid">

      <!-- LEFT — Form -->
     <div class="contact-form-wrap">
<form onsubmit="return mydata()" action="index.html">

<div class="form-row">

<div class="form-group">
<label>Full Name</label>
<input type="text" id="n1" name="name" placeholder="e.g. Ahmed Khan">
</div>

<div class="form-group">
<label>Phone Number</label>
<input type="number" id="n3" name="phone" placeholder="+92 300 0000000">
</div>

</div>

<div class="form-group">
<label>Email Address</label>
<input type="password" id="n2" name="email" placeholder="you@example.com">
</div>

<div class="form-group">
<label>I'm Interested In</label>
<select name="interest">
<option value="">Select a category…</option>
<option>Wall Tiles</option>
<option>Floor Tiles</option>
<option>Special Tiles</option>
<option>Download Catalogue</option>
<option>Trade / Bulk Pricing</option>
<option>General Enquiry</option>
</select>
</div>

<div class="form-group">
<label>Message</label>
<textarea name="message" placeholder="Tell us about your project..."></textarea>
</div>

<button type="submit" class="submit-btn">
Send Message
</button>

</form>
</div>














      <!-- RIGHT — Info cards + Map -->
      <div class="contact-right">

        <div class="info-cards">

          <a class="info-card" href="#">
            <span class="ic-icon">📍</span>
            <div class="ic-label">Address</div>
            <div class="ic-value">
              Plot 14, Block 7,<br>
              Clifton Centre, Karachi<br>
              75600, Pakistan
            </div>
          </a>

          <div class="info-card">
            <span class="ic-icon">📞</span>
            <div class="ic-label">Phone</div>
            <div class="ic-value">+92 321 4567890</div>
          </div>

          <div class="info-card">
            <span class="ic-icon">✉️</span>
            <div class="ic-label">Email</div>
            <div class="ic-value">info@cerastiles.com</div>
          </div>

          <div class="info-card full">
            <span class="ic-icon">🕐</span>
            <div class="ic-text">
              <div class="ic-label">Opening Hours</div>
              <div class="ic-value">Monday – Saturday &nbsp;·&nbsp; 9:00 AM – 6:00 PM</div>
            </div>
          </div>

        </div>

        <!-- Map -->
        <div class="map-wrap">
          <div class="map-overlay-label">
            <span>📍</span> CERA Tiles, Clifton, Karachi
          </div>
          <iframe
            src="https://www.google.com/maps/embed?pb=!1m18!1m12!1m3!1d3619.647908899802!2d67.05951117515251!3d24.875872177919256!2m3!1f0!2f0!3f0!3m2!1i1024!2i768!4f13.1!3m3!1m2!1s0x3eb33e93180d084d%3A0xbda5ea2c72ae6c24!2sTK%20Brothers%20Rabi%20Centre!5e0!3m2!1sen!2s!4v1767858393809!5m2!1sen!2s"
            style="border:0;" allowfullscreen="" loading="lazy">
          </iframe>
        </div>

      </div>
    </div><!-- /contact-grid -->

    <hr class="contact-divider">

  </div>
</section>


<script>

function mydata(){

var Username = document.getElementById("n1").value;
var password = document.getElementById("n2").value;
var contact = document.getElementById("n3").value;

if (Username == "" || password == "" || contact == "")
{
alert("All fields are mandatory");
return false;
}
else{
return true;
}

}

</script>

</body>
</html>
