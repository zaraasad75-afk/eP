<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Project Videos</title>
<style>
#videoSection {
  padding: 40px 20px;
  background: #f7f7f7;
  text-align: center;
}

#videoSection h2 {
  margin-bottom: 30px;
  font-size: 2rem;
}

.video-grid {
  display: flex;
  flex-wrap: wrap;
  gap: 20px;
  justify-content: center;
}

.video-card {
  flex: 1 1 300px;
  max-width: 400px;
  border-radius: 10px;
  overflow: hidden;
  box-shadow: 0 4px 10px rgba(0,0,0,0.1);
}

/* Responsive iframe wrapper */
.video-container {
  position: relative;
  width: 100%;
  padding-bottom: 56.25%; /* 16:9 ratio */
  height: 0;
  overflow: hidden;
}

.video-container iframe {
  position: absolute;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  border: 0;
}
</style>
</head>
<body>

<section id="videoSection">
  <div class="container">
    <h2>Project Videos</h2>
    <div class="video-grid">
      
      <!-- VIDEO 1 -->
      <div class="video-card">
        <div class="video-container">
          <iframe src="https://www.youtube.com/embed/0McN3EcCKL0" 
            title="YouTube video player" 
            allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture" 
            allowfullscreen>
          </iframe>
        </div>
      </div>

      <!-- VIDEO 2 -->
      <div class="video-card">
        <div class="video-container">
          <iframe src="https://www.youtube.com/embed/WM5qJ7upFEI" 
            title="YouTube video player" 
            allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture" 
            allowfullscreen>
          </iframe>
        </div>
      </div>

      <!-- VIDEO 3 -->
      <div class="video-card">
        <div class="video-container">
          <iframe src="https://www.youtube.com/embed/t-VKdeq-72I" 
            title="YouTube video player" 
            allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture" 
            allowfullscreen>
          </iframe>
        </div>
      </div>

    </div>
  </div>
</section>

</body>
</html>
